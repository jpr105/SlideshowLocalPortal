<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slideshow</title>
  <style>
    /* ============================================================
       SLIDESHOW — fichier autonome, aucune dépendance externe
       Pour personnaliser : cherchez les sections marquées "CONFIG"
    ============================================================ */

    /* CONFIG : couleurs & thème */
    :root {
      --bg: #0a0a0f;
      --accent: rgba(255, 255, 255, 0.75);
      --caption-bg: rgba(0, 0, 0, 0.65);
      --dot-inactive: rgba(255, 255, 255, 0.3);
      --dot-active: #ffffff;
      --nav-bg: rgba(255, 255, 255, 0.1);
      --nav-hover: rgba(255, 255, 255, 0.22);
      --progress-color: rgba(255, 255, 255, 0.8);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: white;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      overflow: hidden;
      cursor: pointer;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: none;
      padding: 0 70px;
    }
    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    .slide.exit {
      opacity: 0;
      transform: scale(0.95);
    }
    .slide-bg {
      position: absolute;
      inset: -20px;
      background-size: cover;
      background-position: center;
      filter: blur(18px) brightness(0.45) saturate(1.2);
      transform: scale(1.05);
    }
    .slide img {
      position: relative;
      z-index: 1;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    #progress-bar {
      position: absolute;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: var(--progress-color);
      z-index: 10;
      transition: width 0.1s linear;
    }

    #caption-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 60px 32px 28px;
      background: linear-gradient(transparent, var(--caption-bg));
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      z-index: 10;
      pointer-events: none;
    }
    #caption {
      font-size: 15px;
      font-weight: 500;
      color: var(--accent);
      max-width: 60%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #dots {
      display: flex;
      gap: 7px;
      align-items: center;
      pointer-events: auto;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dot-inactive);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .dot.active {
      background: var(--dot-active);
      width: 22px;
      border-radius: 4px;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--nav-bg);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s;
      user-select: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .nav-btn:hover { background: var(--nav-hover); }
    #btn-prev { left: 16px; }
    #btn-next { right: 16px; }

    #pause-icon {
      position: absolute;
      top: 16px; right: 16px;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      z-index: 10;
      display: none;
    }
    #pause-icon.visible { display: block; }

    #counter {
      position: absolute;
      top: 16px; left: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      z-index: 10;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div id="stage">

  <div id="progress-bar"></div>
  <div id="counter">1 / 9</div>
  <div id="pause-icon">⏸ pause</div>

  <!-- ============================================================
       CONFIG SLIDES : ajoutez/modifiez les slides ici
       Pour utiliser une image : <img src="nom-du-fichier.png" alt="Description">
       Les fichiers images doivent être dans le même dossier que ce .html
       IMPORTANT : un seul slide avec class="slide active" — toujours le premier !
  ============================================================ -->

  <div class="slide active" data-label="Portail Local">
    <img src="page-accueil.png" alt="Portail Local">
  </div>

  <div class="slide" data-label="Section Web">
    <img src="section-web.png" alt="Section Web">
  </div>

  <div class="slide" data-label="Section YouTube">
    <img src="section-youtube.png" alt="Section YouTube">
  </div>

  <div class="slide" data-label="Section Facebook">
    <img src="section-facebook.png" alt="Section Facebook">
  </div>

  <div class="slide" data-label="Section eBooks">
    <img src="section-ebooks.png" alt="Section eBooks">
  </div>

  <div class="slide" data-label="Section Notes perso">
    <img src="section-notes-perso.png" alt="Section Notes perso">
  </div>

  <div class="slide" data-label="Section kDrive">
    <img src="section-kdrive.png" alt="Section kDrive">
  </div>

  <div class="slide" data-label="Inventaire des mots clés">
    <img src="inventaire-des-mots-cles.png" alt="Inventaire des mots clés">
  </div>

  <div class="slide" data-label="SCV - Rechercher">
    <img src="scv-rechercher.png" alt="SCV - Rechercher">
  </div>
  
    <div class="slide" data-label="Raccourcis SCV">
    <img src="raccourcis-scv.png" alt="Raccourcis SCV">
  </div>
  
    <div class="slide" data-label="En savoir plus">
    <img src="en-savoir-plus.png" alt="En savoir plus">
  </div>

  <!-- FIN CONFIG SLIDES -->

  <div id="caption-bar">
    <div id="caption">Portail Local</div>
    <div id="dots"></div>
  </div>

  <div class="nav-btn" id="btn-prev">&#8249;</div>
  <div class="nav-btn" id="btn-next">&#8250;</div>

</div>

<script>
  // ============================================================
  // CONFIG JS
  // ============================================================
  const DURATION_MS = 5000;   // Durée par slide en millisecondes
  const AUTO_PLAY   = true;   // true = lecture automatique au démarrage
  // ============================================================

  const slides   = Array.from(document.querySelectorAll('.slide'));
  const dotsEl   = document.getElementById('dots');
  const captionEl= document.getElementById('caption');
  const progress = document.getElementById('progress-bar');
  const counter  = document.getElementById('counter');
  const pauseIcon= document.getElementById('pause-icon');
  const stage    = document.getElementById('stage');

  let current  = 0;
  let playing  = AUTO_PLAY;
  let elapsed  = 0;
  let lastTime = null;

  // Injecte le fond flouté pour chaque slide avec image
  slides.forEach(slide => {
    const img = slide.querySelector('img');
    if (!img) return;
    const bg = document.createElement('div');
    bg.className = 'slide-bg';
    const setSrc = () => { bg.style.backgroundImage = 'url(' + img.src + ')'; };
    img.complete ? setSrc() : img.addEventListener('load', setSrc);
    slide.insertBefore(bg, slide.firstChild);
  });

  // Génère les dots
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', e => { e.stopPropagation(); goTo(i); });
    dotsEl.appendChild(d);
  });

  function goTo(n) {
    slides[current].classList.remove('active');
    slides[current].classList.add('exit');
    const prev = current;
    setTimeout(() => slides[prev].classList.remove('exit'), 800);

    current = ((n % slides.length) + slides.length) % slides.length;
    slides[current].classList.add('active');

    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    captionEl.textContent = slides[current].dataset.label || ('Slide ' + (current + 1));
    counter.textContent   = (current + 1) + ' / ' + slides.length;

    elapsed = 0;
    lastTime = null;
    progress.style.width = '0%';
  }

  // Boucle RAF
  function tick(ts) {
    if (playing) {
      if (!lastTime) lastTime = ts;
      elapsed += ts - lastTime;
      lastTime = ts;
      const pct = Math.min(100, (elapsed / DURATION_MS) * 100);
      progress.style.width = Math.round(pct) + '%';
      if (elapsed >= DURATION_MS) goTo(current + 1);
    } else {
      lastTime = null;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // Clic sur le stage = slide suivant
  stage.addEventListener('click', () => goTo(current + 1));

  // Boutons nav
  document.getElementById('btn-next').addEventListener('click', e => { e.stopPropagation(); goTo(current + 1); });
  document.getElementById('btn-prev').addEventListener('click', e => { e.stopPropagation(); goTo(current - 1); });

  // Clavier : ← → espace
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') { e.preventDefault(); goTo(current + 1); }
    if (e.key === ' ')          { e.preventDefault(); togglePlay(); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(current - 1); }
  });

  function togglePlay() {
    playing = !playing;
    pauseIcon.classList.toggle('visible', !playing);
  }
</script>

</body>
</html>
